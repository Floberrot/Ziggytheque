codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "back/src/Kernel.php"
  - "back/src/Schedule.php"
  - "back/src/Shared/Infrastructure/ProcessedMessage.php"
  - "back/migrations/**"
