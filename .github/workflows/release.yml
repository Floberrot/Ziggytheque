name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: "Create Release"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next tag
        id: tag
        run: |
          LAST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LAST" ]; then
            NEXT="v1.0.0"
            BASE=""
            BUMP="initial"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST#v}"
            BASE="$LAST"

            # Collect subjects of every commit since last tag
            COMMITS_RAW=$(git log "${BASE}..HEAD" --pretty=format:"%s")

            # feat / fix → minor
            # docs / chore / ci / test / refactor / anything else → patch
            # Major is intentional and must be tagged manually by the developer
            BUMP="patch"
            if echo "$COMMITS_RAW" | grep -qE '^(feat|fix)(\(|!|:)'; then
              BUMP="minor"
            fi

            case $BUMP in
              minor) NEXT="v${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi

          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          BASE="${{ steps.tag.outputs.base }}"

          if [ -z "$BASE" ]; then
            RANGE="HEAD"
          else
            RANGE="${BASE}..HEAD"
          fi

          # All commits as "subject (hash)" lines
          ALL_COMMITS=$(git log $RANGE --pretty=format:"%s (%h)" 2>/dev/null || true)

          # ── Categorise by conventional commit type ──────────────────────────
          FEAT_COMMITS=$(echo "$ALL_COMMITS"     | grep -E '^feat(\(|!|:)'     | sed 's/^/- /' || true)
          FIX_COMMITS=$(echo "$ALL_COMMITS"      | grep -E '^fix(\(|:)'        | sed 's/^/- /' || true)
          REFACTOR_COMMITS=$(echo "$ALL_COMMITS" | grep -E '^refactor(\(|:)'   | sed 's/^/- /' || true)
          CHORE_COMMITS=$(echo "$ALL_COMMITS"    | grep -E '^chore(\(|:)'      | sed 's/^/- /' || true)
          CI_COMMITS=$(echo "$ALL_COMMITS"       | grep -E '^ci(\(|:)'         | sed 's/^/- /' || true)
          DOCS_COMMITS=$(echo "$ALL_COMMITS"     | grep -E '^docs(\(|:)'       | sed 's/^/- /' || true)
          TEST_COMMITS=$(echo "$ALL_COMMITS"     | grep -E '^test(\(|:)'       | sed 's/^/- /' || true)
          OTHER_COMMITS=$(echo "$ALL_COMMITS"    | grep -vE '^(feat|fix|refactor|chore|ci|docs|test)(\(|!|:)' | sed 's/^/- /' || true)

          # ── Build # Commits section ──────────────────────────────────────────
          COMMITS_SECTION="# Commits:"$'\n'

          if [ -n "$FEAT_COMMITS" ]; then
            COMMITS_SECTION+=$'\n'"## Feats:"$'\n'"$FEAT_COMMITS"$'\n'
          fi
          if [ -n "$FIX_COMMITS" ]; then
            COMMITS_SECTION+=$'\n'"## Fix:"$'\n'"$FIX_COMMITS"$'\n'
          fi
          if [ -n "$REFACTOR_COMMITS" ]; then
            COMMITS_SECTION+=$'\n'"## Refactor:"$'\n'"$REFACTOR_COMMITS"$'\n'
          fi
          if [ -n "$CHORE_COMMITS" ]; then
            COMMITS_SECTION+=$'\n'"## Chore:"$'\n'"$CHORE_COMMITS"$'\n'
          fi
          if [ -n "$CI_COMMITS" ]; then
            COMMITS_SECTION+=$'\n'"## CI:"$'\n'"$CI_COMMITS"$'\n'
          fi
          if [ -n "$DOCS_COMMITS" ]; then
            COMMITS_SECTION+=$'\n'"## Docs:"$'\n'"$DOCS_COMMITS"$'\n'
          fi
          if [ -n "$TEST_COMMITS" ]; then
            COMMITS_SECTION+=$'\n'"## Tests:"$'\n'"$TEST_COMMITS"$'\n'
          fi
          if [ -n "$OTHER_COMMITS" ]; then
            COMMITS_SECTION+=$'\n'"## Others:"$'\n'"$OTHER_COMMITS"$'\n'
          fi

          # ── Build # Sum-Up section ───────────────────────────────────────────
          strip_prefix() {
            echo "$1" \
              | sed -E 's/^[a-z]+(\([^)]+\))?[!]?: //' \
              | sed 's/ ([a-f0-9]\{7\})$//'
          }

          FEAT_DESCS=$(echo "$ALL_COMMITS" | grep -E '^feat(\(|!|:)' \
            | while IFS= read -r line; do strip_prefix "$line"; done \
            | head -5 | paste -sd ', ' || true)
          FIX_DESCS=$(echo "$ALL_COMMITS" | grep -E '^fix(\(|:)' \
            | while IFS= read -r line; do strip_prefix "$line"; done \
            | head -5 | paste -sd ', ' || true)
          REFACTOR_DESCS=$(echo "$ALL_COMMITS" | grep -E '^refactor(\(|:)' \
            | while IFS= read -r line; do strip_prefix "$line"; done \
            | head -3 | paste -sd ', ' || true)
          OTHER_DESCS=$(echo "$ALL_COMMITS" \
            | grep -vE '^(feat|fix|refactor)(\(|!|:)' \
            | while IFS= read -r line; do strip_prefix "$line"; done \
            | head -3 | paste -sd ', ' || true)

          TOTAL_COUNT=$(echo "$ALL_COMMITS" | grep -c '.' || echo 0)

          SUMUP_SECTION=$'\n'"# Sum-Up:"$'\n\n'
          PARA=""

          if [ -n "$FEAT_DESCS" ]; then
            PARA+="This release introduces the following new features: ${FEAT_DESCS}. "
          fi
          if [ -n "$FIX_DESCS" ]; then
            PARA+="On the bug-fix side, it resolves: ${FIX_DESCS}. "
          fi
          if [ -n "$REFACTOR_DESCS" ]; then
            PARA+="The codebase also received the following refactors: ${REFACTOR_DESCS}. "
          fi
          if [ -n "$OTHER_DESCS" ]; then
            PARA+="Other maintenance work includes: ${OTHER_DESCS}. "
          fi

          if [ -z "$PARA" ]; then
            PARA="This release contains ${TOTAL_COUNT} commit$([ "$TOTAL_COUNT" -gt 1 ] && echo 's') with no conventional-commit-typed changes."
          else
            PARA+="A total of ${TOTAL_COUNT} commit$([ "$TOTAL_COUNT" -gt 1 ] && echo 's') were merged into this release."
          fi

          SUMUP_SECTION+="$PARA"

          NOTES="${COMMITS_SECTION}${SUMUP_SECTION}"

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES"     >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag ${{ steps.tag.outputs.next }}
          git push origin ${{ steps.tag.outputs.next }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.tag.outputs.next }} \
            --title "Release ${{ steps.tag.outputs.next }}" \
            --notes "${{ steps.notes.outputs.notes }}"
