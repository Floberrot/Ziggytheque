name: Release

# Called automatically by deploy-production.yml after all services deploy successfully.
# Can also be triggered manually as a fallback.
on:
  workflow_call: {}
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual release'
        required: false
        default: 'Manual release'

permissions:
  contents: write

jobs:
  release:
    name: "Create Release"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next tag
        id: tag
        run: |
          LAST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LAST" ]; then
            NEXT="v1.0.0"
            BASE=""
            BUMP="initial"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST#v}"
            BASE="$LAST"

            COMMITS_RAW=$(git log "${BASE}..HEAD" --pretty=format:"%s")

            BUMP="patch"
            if echo "$COMMITS_RAW" | grep -qE '^feat(\(|!|:)'; then
              BUMP="minor"
            fi

            case $BUMP in
              minor) NEXT="v${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi

          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          BASE="${{ steps.tag.outputs.base }}"
          RANGE="${BASE:+${BASE}..}HEAD"

          ALL_COMMITS=$(git log $RANGE --pretty=format:"%s (%h)" 2>/dev/null || true)

          # ── Commit formatter: type(scope): msg → emoji scope → msg ──────────
          format_commit() {
            local raw="$1" hash line type scope msg emoji
            hash=$(printf '%s' "$raw" | grep -oE ' \([a-f0-9]{7}\)$' || true)
            line=$(printf '%s' "$raw" | sed -E 's/ \([a-f0-9]{7}\)$//')

            if printf '%s' "$line" | grep -qE '^[a-z]+(\([^)]+\))?!?: '; then
              type=$(printf '%s' "$line" | sed -E 's/^([a-z]+).*/\1/')
              if printf '%s' "$line" | grep -qE '^[a-z]+\('; then
                scope=$(printf '%s' "$line" | sed -E 's/^[a-z]+\(([^)]+)\).*/\1/')
                msg=$(printf '%s' "$line" | sed -E 's/^[a-z]+\([^)]+\)!?: //')
              else
                scope=""
                msg=$(printf '%s' "$line" | sed -E 's/^[a-z]+!?: //')
              fi
              # Types from .githooks/commit-msg: feat | fix | refactor | chore | tests | ci
              case "$type" in
                feat)     emoji="⭐" ;;
                fix)      emoji="🐛" ;;
                refactor) emoji="♻️" ;;
                chore)    emoji="🔧" ;;
                tests)    emoji="🧪" ;;
                ci)       emoji="⚙️" ;;
                *)        emoji="🔹" ;;
              esac
              if [ -n "$scope" ]; then
                printf -- '- %s %s → %s%s\n' "$emoji" "$scope" "$msg" "$hash"
              else
                printf -- '- %s %s%s\n' "$emoji" "$msg" "$hash"
              fi
            else
              printf -- '- 🔹 %s\n' "$raw"
            fi
          }

          # ── Build Changes list (ordered to match commit-msg hook types) ────────
          CHANGES=""
          for TYPE_FILTER in feat fix refactor chore tests ci; do
            while IFS= read -r commit; do
              [ -z "$commit" ] && continue
              CHANGES+="$(format_commit "$commit")"$'\n'
            done < <(printf '%s\n' "$ALL_COMMITS" | grep -E "^${TYPE_FILTER}(\(|!|:)" || true)
          done
          # Commits with no conventional prefix (should not happen if hook is enforced)
          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            CHANGES+="$(format_commit "$commit")"$'\n'
          done < <(printf '%s\n' "$ALL_COMMITS" | grep -vE '^(feat|fix|refactor|chore|tests|ci)(\(|!|:)' || true)

          [ -z "$CHANGES" ] && CHANGES="- 🔹 No commits"$'\n'

          # ── Build Summary paragraph ──────────────────────────────────────────
          strip_prefix() {
            printf '%s' "$1" \
              | sed -E 's/^[a-z]+(\([^)]+\))?[!]?: //' \
              | sed -E 's/ \([a-f0-9]{7}\)$//'
          }

          FEAT_DESCS=$(printf '%s\n' "$ALL_COMMITS" | grep -E '^feat(\(|!|:)' \
            | while IFS= read -r l; do strip_prefix "$l"; done \
            | head -5 | paste -sd ', ' || true)
          FIX_DESCS=$(printf '%s\n' "$ALL_COMMITS" | grep -E '^fix(\(|:)' \
            | while IFS= read -r l; do strip_prefix "$l"; done \
            | head -5 | paste -sd ', ' || true)
          REFACTOR_DESCS=$(printf '%s\n' "$ALL_COMMITS" | grep -E '^refactor(\(|:)' \
            | while IFS= read -r l; do strip_prefix "$l"; done \
            | head -3 | paste -sd ', ' || true)
          OTHER_DESCS=$(printf '%s\n' "$ALL_COMMITS" \
            | grep -vE '^(feat|fix|refactor|chore|tests|ci)(\(|!|:)' \
            | while IFS= read -r l; do strip_prefix "$l"; done \
            | head -3 | paste -sd ', ' || true)

          TOTAL_COUNT=$(printf '%s\n' "$ALL_COMMITS" | grep -c '.' || echo 0)

          SUMMARY=""
          [ -n "$FEAT_DESCS" ]     && SUMMARY+="This release introduces: ${FEAT_DESCS}. "
          [ -n "$FIX_DESCS" ]      && SUMMARY+="Fixes: ${FIX_DESCS}. "
          [ -n "$REFACTOR_DESCS" ] && SUMMARY+="Refactored: ${REFACTOR_DESCS}. "
          [ -n "$OTHER_DESCS" ]    && SUMMARY+="Other changes: ${OTHER_DESCS}. "

          if [ -z "$SUMMARY" ]; then
            SUMMARY="This release contains ${TOTAL_COUNT} commit$([ "$TOTAL_COUNT" -gt 1 ] && echo 's' || true) with no conventional-commit-typed changes."
          else
            SUMMARY+="A total of ${TOTAL_COUNT} commit$([ "$TOTAL_COUNT" -gt 1 ] && echo 's' || true) shipped in this release."
          fi

          NOTES="# Changes"$'\n\n'"${CHANGES}"$'\n'"---"$'\n\n'"# Summary"$'\n\n'"${SUMMARY}"

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES"     >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag ${{ steps.tag.outputs.next }}
          git push origin ${{ steps.tag.outputs.next }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.tag.outputs.next }} \
            --title "Release ${{ steps.tag.outputs.next }}" \
            --notes "${{ steps.notes.outputs.notes }}"
