name: Deploy — Production

# Manually triggered. To deploy: click "Run workflow", switch the
# "Use workflow from" dropdown to the "Tags" tab, pick the release tag.
# GitHub fetches the tag list live from its API — nothing to maintain here.
# Merging a PR to main does NOT trigger this workflow.
on:
  workflow_dispatch:

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
  RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}

# ---------------------------------------------------------------------------
# Quality gate — every gate is re-run against the selected tag so we never
# deploy a revision that does not pass CI.
# ---------------------------------------------------------------------------

jobs:

  # --- Guard: must be dispatched from a tag, not a branch --------------------

  guard:
    name: "Gate: Dispatched from a tag"
    runs-on: ubuntu-latest
    steps:
      - name: Check ref is a tag
        run: |
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "::error::This workflow must be dispatched from a tag. Open the Run workflow dialog, switch to the Tags tab, and pick a release tag (e.g. v2.0.5)."
            exit 1
          fi
          echo "Deploying tag ${{ github.ref_name }} (${{ github.sha }})"

  # --- Backend: code style ---------------------------------------------------

  phpcs:
    name: "Gate: PHP_CodeSniffer"
    runs-on: ubuntu-latest
    needs: [guard]
    defaults:
      run:
        working-directory: back
    env:
      APP_SECRET: ci-secret-not-used
      JWT_PASSPHRASE: ${{ secrets.JWT_PASSPHRASE || 'ci-jwt-passphrase' }}
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - uses: actions/cache@v5
        with:
          path: back/vendor
          key: composer-${{ hashFiles('back/composer.lock') }}
          restore-keys: composer-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: vendor/bin/phpcs

  # --- Backend: architecture -------------------------------------------------

  deptrac:
    name: "Gate: Deptrac"
    runs-on: ubuntu-latest
    needs: [guard]
    defaults:
      run:
        working-directory: back
    env:
      APP_SECRET: ci-secret-not-used
      JWT_PASSPHRASE: ${{ secrets.JWT_PASSPHRASE || 'ci-jwt-passphrase' }}
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - uses: actions/cache@v5
        with:
          path: back/vendor
          key: composer-${{ hashFiles('back/composer.lock') }}
          restore-keys: composer-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: vendor/bin/deptrac analyse --no-progress

  # --- Backend: static analysis ----------------------------------------------

  phpstan:
    name: "Gate: PHPStan"
    runs-on: ubuntu-latest
    needs: [guard]
    defaults:
      run:
        working-directory: back
    env:
      DATABASE_URL: postgresql://ziggy:ziggy@127.0.0.1:5432/ziggytheque?serverVersion=17&charset=utf8
      APP_SECRET: ci-secret-not-used
      JWT_PASSPHRASE: ${{ secrets.JWT_PASSPHRASE || 'ci-jwt-passphrase' }}
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ziggy
          POSTGRES_PASSWORD: ziggy
          POSTGRES_DB: ziggytheque
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, intl
          tools: composer
          coverage: none
      - uses: actions/cache@v5
        with:
          path: back/vendor
          key: composer-${{ hashFiles('back/composer.lock') }}
          restore-keys: composer-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genrsa -passout pass:${JWT_PASSPHRASE} -out config/jwt/private.pem 4096
          openssl rsa -pubout -passin pass:${JWT_PASSPHRASE} -in config/jwt/private.pem -out config/jwt/public.pem
      - run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
      - run: php bin/console cache:warmup --env=dev
      - run: vendor/bin/phpstan analyse --no-progress

  # --- Backend: database migrations ------------------------------------------

  db-migrations:
    name: "Gate: DB Migrations"
    runs-on: ubuntu-latest
    needs: [guard]
    defaults:
      run:
        working-directory: back
    env:
      DATABASE_URL: postgresql://ziggy:ziggy@127.0.0.1:5432/ziggytheque?serverVersion=17&charset=utf8
      APP_SECRET: ci-secret-not-used
      JWT_PASSPHRASE: ${{ secrets.JWT_PASSPHRASE || 'ci-jwt-passphrase' }}
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ziggy
          POSTGRES_PASSWORD: ziggy
          POSTGRES_DB: ziggytheque
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, intl
          tools: composer
          coverage: none
      - uses: actions/cache@v5
        with:
          path: back/vendor
          key: composer-${{ hashFiles('back/composer.lock') }}
          restore-keys: composer-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genrsa -passout pass:${JWT_PASSPHRASE} -out config/jwt/private.pem 4096
          openssl rsa -pubout -passin pass:${JWT_PASSPHRASE} -in config/jwt/private.pem -out config/jwt/public.pem
      - run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

  # --- Backend: test suite ---------------------------------------------------

  tests:
    name: "Gate: PHPUnit"
    runs-on: ubuntu-latest
    needs: [guard]
    defaults:
      run:
        working-directory: back
    env:
      DATABASE_URL: postgresql://ziggy:ziggy@127.0.0.1:5432/ziggytheque?serverVersion=17&charset=utf8
      APP_SECRET: ci-secret-not-used
      JWT_PASSPHRASE: ${{ secrets.JWT_PASSPHRASE || 'ci-jwt-passphrase' }}
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ziggy
          POSTGRES_PASSWORD: ziggy
          POSTGRES_DB: ziggytheque
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, intl
          tools: composer
          coverage: none
      - uses: actions/cache@v5
        with:
          path: back/vendor
          key: composer-${{ hashFiles('back/composer.lock') }}
          restore-keys: composer-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genrsa -passout pass:${JWT_PASSPHRASE} -out config/jwt/private.pem 4096
          openssl rsa -pubout -passin pass:${JWT_PASSPHRASE} -in config/jwt/private.pem -out config/jwt/public.pem
      - run: php bin/console doctrine:database:create --env=test --if-not-exists
      - run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration --env=test
      - run: php bin/phpunit --no-progress

  # --- Frontend: TypeScript + ESLint -----------------------------------------

  frontend:
    name: "Gate: Frontend (vue-tsc + ESLint)"
    runs-on: ubuntu-latest
    needs: [guard]
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: front/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint

  # --- Docker build validation -----------------------------------------------

  docker-build:
    name: "Gate: Docker Build (prod + frontend)"
    runs-on: ubuntu-latest
    needs: [guard]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build backend prod stage
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend
        uses: docker/build-push-action@v7
        with:
          context: front
          file: front/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Approval gate — all quality gates must pass, then a reviewer must approve
  # the `production` environment before Railway is touched.
  # ---------------------------------------------------------------------------

  approve:
    name: "Approval Gate: Production"
    runs-on: ubuntu-latest
    environment: production
    needs: [phpcs, deptrac, phpstan, db-migrations, tests, frontend, docker-build]
    steps:
      - run: echo "Production deployment of ${{ github.ref_name }} approved — proceeding"

  # ---------------------------------------------------------------------------
  # Sync env var keys — after approval, before the deploy. Compares the env vars
  # declared in the repo's .env files against what is already set on production
  # and creates any missing one EMPTY (never edits existing values), so a new
  # var only needs its value typed in the Railway dashboard. Runs before the
  # deploy jobs so the keys exist when the new code boots.
  # ---------------------------------------------------------------------------

  sync-env:
    name: "Production: Sync env var keys"
    runs-on: ubuntu-latest
    needs: [approve]
    steps:
      - uses: actions/checkout@v5
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Create empty placeholders for new env vars
        run: ./scripts/railway-sync-env-keys.sh "$RAILWAY_ENVIRONMENT_ID"

  # ---------------------------------------------------------------------------
  # Deploy to production — single API job: worker first (messenger:consume),
  # then backend (frankenphp run).  Front deploys in parallel.
  # ---------------------------------------------------------------------------

  deploy-api:
    name: "Production: Deploy API (worker → backend)"
    runs-on: ubuntu-latest
    needs: [sync-env]
    env:
      DEPLOY_MSG: "Deploy ${{ github.ref_name }}"
    steps:
      - uses: actions/checkout@v5
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy worker service (messenger:consume)
        # Swap in worker/railway.json so Railway uses dockerBuildTarget: "worker".
        # Restore the original railway.json afterwards for the backend step.
        run: |
          cp worker/railway.json railway.json
          for attempt in 1 2; do
            railway up \
              --service ziggytheque-worker \
              --ci \
              -m "$DEPLOY_MSG" && break
            echo "Attempt $attempt failed — retrying in 30s..."
            sleep 30
          done
          git checkout railway.json
      - name: Deploy backend service (frankenphp run)
        run: |
          for attempt in 1 2; do
            railway up \
              --service ziggytheque-back \
              --ci \
              -m "$DEPLOY_MSG" && break
            echo "Attempt $attempt failed — retrying in 30s..."
            sleep 30
          done

  deploy-front:
    name: "Production: Deploy Frontend"
    runs-on: ubuntu-latest
    needs: [sync-env]
    steps:
      - uses: actions/checkout@v5
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy frontend service
        working-directory: front
        env:
          DEPLOY_MSG: "Deploy ${{ github.ref_name }}"
        run: |
          for attempt in 1 2; do
            railway up \
              --service ziggytheque-front \
              --ci \
              -m "$DEPLOY_MSG" && break
            echo "Attempt $attempt failed — retrying in 30s..."
            sleep 30
          done
