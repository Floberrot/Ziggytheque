name: Database

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

defaults:
  run:
    working-directory: back

env:
  DATABASE_URL: postgresql://ziggy:ziggy@127.0.0.1:5432/ziggytheque?serverVersion=17&charset=utf8
  APP_SECRET: ci-secret-not-used
  JWT_PASSPHRASE: ${{ secrets.JWT_PASSPHRASE || 'ci-jwt-passphrase' }}

jobs:
  migrations:
    name: Migrations + Schema Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ziggy
          POSTGRES_PASSWORD: ziggy
          POSTGRES_DB: ziggytheque
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, intl
          tools: composer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: back/vendor
          key: composer-${{ hashFiles('back/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genrsa -passout pass:${JWT_PASSPHRASE} -out config/jwt/private.pem 4096
          openssl rsa -pubout -passin pass:${JWT_PASSPHRASE} -in config/jwt/private.pem -out config/jwt/public.pem

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

      - name: Validate Doctrine schema
        run: php bin/console doctrine:schema:validate

  migration-safety:
    name: Migration safety (dry-run + destructive detection)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ziggy
          POSTGRES_PASSWORD: ziggy
          POSTGRES_DB: ziggytheque
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, intl
          tools: composer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: back/vendor
          key: composer-${{ hashFiles('back/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genrsa -passout pass:${JWT_PASSPHRASE} -out config/jwt/private.pem 4096
          openssl rsa -pubout -passin pass:${JWT_PASSPHRASE} -in config/jwt/private.pem -out config/jwt/public.pem

      - name: Detect destructive SQL in new migrations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BASE=$(git merge-base HEAD "origin/${{ github.base_ref }}")
          NEW=$(git diff --name-only --diff-filter=A "$BASE" HEAD -- migrations/ | grep 'Version.*\.php$' || true)

          if [ -z "$NEW" ]; then
            echo "No new migrations — skipping destructive check."
            exit 0
          fi

          # Patterns that cause data loss or long table locks in production
          DESTRUCTIVE_PATTERN='(DROP TABLE|DROP COLUMN|TRUNCATE|DROP CONSTRAINT|ALTER COLUMN.+NOT NULL|ALTER COLUMN.+TYPE )'

          REPORT=""
          while IFS= read -r migrationFile; do
            [ -z "$migrationFile" ] && continue
            # Strip back/ prefix: git diff shows paths from repo root, we run in back/
            localFile=$(echo "$migrationFile" | sed 's|^back/||')
            [ -f "$localFile" ] || continue
            HITS=$(grep -nEi "$DESTRUCTIVE_PATTERN" "$localFile" 2>/dev/null || true)
            if [ -n "$HITS" ]; then
              REPORT="$REPORT"$'\n'"**\`$localFile\`**"$'\n'"$(echo "$HITS" | while IFS= read -r line; do echo "> \`$line\`"; done)"$'\n'
            fi
          done <<< "$NEW"

          if [ -n "$REPORT" ]; then
            gh pr comment "$PR_NUMBER" --body "## ⚠️ Destructive Migration Detected

This PR adds migration(s) with potentially **destructive SQL operations** that can cause data loss or long table locks in production.

$REPORT

### Risk reference
| Pattern | Risk |
|---|---|
| \`DROP TABLE\` / \`DROP COLUMN\` | Permanent data loss |
| \`TRUNCATE\` | Empties the table — cannot be rolled back |
| \`DROP CONSTRAINT\` | Breaks referential integrity |
| \`ALTER COLUMN ... NOT NULL\` without DEFAULT | Fails instantly on non-empty tables |
| \`ALTER COLUMN ... TYPE\` | May truncate or corrupt existing values |

### Safe migration path
1. Add the column as **nullable** first → deploy
2. **Backfill** existing rows in a background job
3. Add the NOT NULL constraint → deploy
4. Drop the old column in a **separate** deploy (after verifying nothing reads it)

Please confirm this migration is safe before merging. 🙏"
          fi

      - name: Dry-run new migrations against simulated prod state
        run: |
          BASE=$(git merge-base HEAD "origin/${{ github.base_ref }}")
          NEW=$(git diff --name-only --diff-filter=A "$BASE" HEAD -- migrations/ | grep 'Version.*\.php$' || true)

          if [ -z "$NEW" ]; then
            echo "No new migrations in this PR — nothing to check."
            exit 0
          fi

          echo "::warning::New migrations in this PR. Review the SQL below before merging."

          # Remove new migrations → simulate the production baseline
          echo "$NEW" | sed 's|^back/||' | xargs -r rm -f
          php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

          # Restore and dry-run against the simulated baseline
          git checkout HEAD -- migrations/
          SQL=$(php bin/console doctrine:migrations:migrate --dry-run --no-interaction 2>&1 || true)

          echo "### Migration dry-run SQL" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```sql' >> "$GITHUB_STEP_SUMMARY"
          echo "$SQL" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
