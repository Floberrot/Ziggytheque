parameters:
    gate_password: '%env(GATE_PASSWORD)%'
    jwt_ttl: '%env(int:JWT_TTL)%'
    notification_email: '%env(NOTIFICATION_EMAIL)%'
    discord_webhook_url: '%env(default::DISCORD_WEBHOOK_URL)%'
    app_front_url: '%env(default:app_front_url_default:APP_FRONT_URL)%'
    app_front_url_default: 'http://localhost:5173'
    following.rss_feeds:
        - { name: 'manga-news',      url: 'https://www.manga-news.com/index.php/feed/news' }
        - { name: 'adala-news',      url: 'https://adala-news.fr/feed/' }
        - { name: 'animeland',       url: 'https://animeland.fr/feed/' }
        - { name: 'animotaku',       url: 'https://animotaku.fr/feed/' }
        - { name: 'nautiljon',       url: 'http://feeds.feedburner.com/nautiljon/NdFI' }
        - { name: 'journal-du-japon', url: 'https://www.journaldujapon.com/feed/' }
        - { name: 'planete-bd',      url: 'http://feeds.feedburner.com/PlaneteBdLight-ChroniquesMangas' }

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/*/Domain/Exception/'
            - '../src/Shared/Domain/'
            - '../src/*/Shared/Event/'
            - '../src/Auth/Domain/ValueObject/'

    # Auth providers
    App\Auth\Infrastructure\Http\MonitorUserProvider:
        arguments:
            $monitorUser: '%env(MONITOR_USER)%'
            $monitorPassword: '%env(MONITOR_PASSWORD)%'

    App\Auth\Infrastructure\Security\DoctrineUserProvider:
        arguments:
            $userRepository: '@App\Auth\Domain\UserRepositoryInterface'

    # Auth repositories
    App\Auth\Domain\UserRepositoryInterface:
        alias: App\Auth\Infrastructure\Doctrine\DoctrineUserRepository

    App\Auth\Domain\AuthTokenRepositoryInterface:
        alias: App\Auth\Infrastructure\Doctrine\DoctrineAuthTokenRepository

    App\Auth\Shared\UserReaderInterface:
        alias: App\Auth\Infrastructure\Doctrine\DoctrineUserReader

    App\Auth\Domain\Service\TokenGeneratorInterface:
        alias: App\Auth\Infrastructure\Token\SecureTokenGenerator

    App\Auth\Domain\Service\AdminBackfillServiceInterface:
        alias: App\Auth\Infrastructure\Doctrine\DoctrineAdminBackfillService

    # Shared security
    App\Shared\Domain\Security\CurrentUserProviderInterface:
        alias: App\Auth\Infrastructure\Security\SymfonyCurrentUserProvider

    # Gate auth (second factor admin)
    App\Auth\Application\Gate\GateHandler:
        arguments:
            $gatePassword: '%env(GATE_PASSWORD)%'
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    # Auth handlers requiring $frontUrl
    App\Auth\Application\RequestPasswordReset\RequestPasswordResetHandler:
        arguments:
            $frontUrl: '%app_front_url%'
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    App\Auth\Application\Admin\GenerateResetLink\GenerateResetLinkHandler:
        arguments:
            $frontUrl: '%app_front_url%'
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    # Transactional auth emails (verification, password reset, approval)
    App\Auth\Infrastructure\Listener\AuthEmailListener:
        arguments:
            $frontUrl: '%app_front_url%'
            $notificationEmail: '%notification_email%'

    # Bus interfaces bound to Messenger implementations
    App\Shared\Application\Bus\CommandBusInterface:
        alias: App\Shared\Infrastructure\Bus\MessengerCommandBus

    App\Shared\Application\Bus\QueryBusInterface:
        alias: App\Shared\Infrastructure\Bus\MessengerQueryBus

    App\Shared\Application\Bus\EventBusInterface:
        alias: App\Shared\Infrastructure\Bus\SymfonyEventBus

    # Repository interfaces bound to Doctrine implementations
    App\Manga\Domain\MangaRepositoryInterface:
        alias: App\Manga\Infrastructure\Doctrine\DoctrineMangaRepository

    # Jikan (MyAnimeList) for series search (AddManga flow) — the default provider
    App\Manga\Domain\ExternalApiClientInterface:
        alias: App\Manga\Infrastructure\ExternalApi\JikanMangaApiClient

    # Service locator so SearchExternalMangaHandler can target a user-selected
    # series-search provider (the front exposes the choice next to the search field).
    App\Manga\Application\SearchExternal\SearchExternalMangaHandler:
        arguments:
            $providerLocator: !service_locator
                jikan: '@App\Manga\Infrastructure\ExternalApi\JikanMangaApiClient'
                googlebooks: '@App\Manga\Infrastructure\ExternalApi\GoogleBooksMangaApiClient'

    # Cover provider composite — used for per-volume cover resolution
    App\Manga\Domain\MangaCoverProviderInterface:
        alias: App\Manga\Infrastructure\ExternalApi\CompositeMangaCoverApiClient

    # Aggregates every source's cover for one ISBN (grouped result for the user)
    App\Manga\Domain\MultiSourceCoverProviderInterface:
        alias: App\Manga\Infrastructure\ExternalApi\CompositeMangaCoverApiClient

    # Service locator so SearchVolumeExternalHandler can narrow the title search to
    # a single context source. The default ('composite') merges them all. Only the
    # context-capable sources are offered (the front exposes the same three).
    App\Manga\Application\SearchVolumeExternal\SearchVolumeExternalHandler:
        arguments:
            $providerLocator: !service_locator
                mangadex: '@App\Manga\Infrastructure\ExternalApi\MangaDexMangaApiClient'
                googlebooks: '@App\Manga\Infrastructure\ExternalApi\GoogleBooksMangaApiClient'

    App\Manga\Infrastructure\ExternalApi\CompositeMangaCoverApiClient:
        arguments:
            $providers: !tagged_iterator { tag: app.manga_cover_provider }
            $contextProviders: !tagged_iterator { tag: app.manga_context_cover_provider }

    # Cover providers ordered by priority (highest tried first).
    #
    # findByIsbn (exact, edition-accurate) is served by BnF → OpenLibrary → keyless
    # Google: the authoritative French catalogues are trusted first (BnF legal
    # deposit, then OpenLibrary open data), and the keyless Google endpoint is only a
    # last-resort fallback — it suppresses covers for rights-protected series.
    # findByContext (title search) is served by MangaDex alone (the ISBN providers
    # return null for it), so MangaDex stays top priority without affecting the ISBN
    # cascade order.
    App\Manga\Infrastructure\ExternalApi\MangaDexMangaApiClient:
        arguments:
            $baseUrl: '%env(MANGADEX_BASE_URL)%'
        tags:
            - { name: app.manga_cover_provider, priority: 100 }
            # Title-search source (every volume cover edition/locale), highest priority.
            - { name: app.manga_context_cover_provider, priority: 100 }

    # BnF (French national library) — keyless, authoritative for French editions
    # (legal deposit). Default source for ISBN cover lookups.
    App\Manga\Infrastructure\ExternalApi\BnfCoversApiClient:
        arguments:
            $baseUrl: '%env(BNF_BASE_URL)%'
        tags:
            - { name: app.manga_cover_provider, priority: 80 }

    # OpenLibrary — keyless open data. Second ISBN source, after BnF.
    App\Manga\Infrastructure\ExternalApi\OpenLibraryCoversApiClient:
        arguments:
            $baseUrl: '%env(OPEN_LIBRARY_COVERS_BASE_URL)%'
        tags:
            - { name: app.manga_cover_provider, priority: 70 }

    # Keyless Google cover lookup — no API key, not quota-metered. Last-resort
    # fallback only: it suppresses covers for rights-protected series (e.g. One Piece).
    App\Manga\Infrastructure\ExternalApi\GoogleBooksDynamicLinksApiClient:
        arguments:
            $baseUrl: '%env(GOOGLE_BOOKS_WEB_BASE_URL)%'
        tags:
            - { name: app.manga_cover_provider, priority: 60 }

    # Hardcover (community DB) — keyed (Bearer token), ISBN-only. Re-hosts covers on
    # its own CDN, so it can surface covers publishers hide from Google. No-op (no
    # request) until HARDCOVER_API_TOKEN is set, so it stays harmless otherwise.
    App\Manga\Infrastructure\ExternalApi\HardcoverCoversApiClient:
        arguments:
            $baseUrl: '%env(HARDCOVER_BASE_URL)%'
            $apiToken: '%env(HARDCOVER_API_TOKEN)%'
        tags:
            - { name: app.manga_cover_provider, priority: 55 }

    # Keyed Google Books API — NOT in the ISBN cover cascade (without a working key
    # it only 429s), but a title-search context source: the composite merges its
    # covers with MangaDex's and logs+skips it on failure, so it stays harmless.
    App\Manga\Infrastructure\ExternalApi\GoogleBooksMangaApiClient:
        arguments:
            $apiKey: '%env(GOOGLE_BOOKS_API_KEY)%'
        tags:
            - { name: app.manga_context_cover_provider, priority: 50 }

    # Resolves the work's title in the target language (AniList) before searching
    # foreign catalogues. Keyless GraphQL.
    App\Manga\Domain\WorkTitleResolverInterface:
        alias: App\Manga\Infrastructure\ExternalApi\AniListWorkTitleResolver

    App\Manga\Infrastructure\ExternalApi\AniListWorkTitleResolver:
        arguments:
            $baseUrl: '%env(ANILIST_BASE_URL)%'

    # Edition providers composite — discovers all editions of a work across sources.
    App\Manga\Domain\EditionProviderInterface:
        alias: App\Manga\Infrastructure\ExternalApi\CompositeEditionProvider

    App\Manga\Infrastructure\ExternalApi\CompositeEditionProvider:
        arguments:
            $providers: !tagged_iterator { tag: app.manga_edition_provider }

    # BnF SRU — keyless, authoritative for French editions (legal deposit). Priority 80.
    App\Manga\Infrastructure\ExternalApi\BnfEditionProvider:
        arguments:
            $baseUrl: '%env(BNF_BASE_URL)%'
        tags:
            - { name: app.manga_edition_provider, priority: 80 }

    # DNB SRU — keyless, authoritative for German editions (Carlsen, Egmont…). Priority 75.
    App\Manga\Infrastructure\ExternalApi\DnbEditionProvider:
        arguments:
            $baseUrl: '%env(DNB_BASE_URL)%'
        tags:
            - { name: app.manga_edition_provider, priority: 75 }

    # NDL SRU — keyless, authoritative for Japanese editions (queried with the native
    # title resolved by AniList). Priority 74.
    App\Manga\Infrastructure\ExternalApi\NdlEditionProvider:
        arguments:
            $baseUrl: '%env(NDL_BASE_URL)%'
        tags:
            - { name: app.manga_edition_provider, priority: 74 }

    # Open Library — Work → editions.json; best US/EN coverage (Deluxe, omnibus). Priority 70.
    App\Manga\Infrastructure\ExternalApi\OpenLibraryEditionProvider:
        arguments:
            $baseUrl: '%env(OPEN_LIBRARY_BASE_URL)%'
            $userAgent: '%env(OPENLIBRARY_USER_AGENT)%'
        tags:
            - { name: app.manga_edition_provider, priority: 70 }

    # Google Books — enrichment (fills missing ISBN / covers). Priority 50.
    App\Manga\Infrastructure\ExternalApi\GoogleBooksEditionProvider:
        arguments:
            $apiKey: '%env(GOOGLE_BOOKS_API_KEY)%'
        tags:
            - { name: app.manga_edition_provider, priority: 50 }

    # Price providers composite — fetches live merchant offers per ISBN + marketplace.
    App\Manga\Domain\VolumePriceProviderInterface:
        alias: App\Manga\Infrastructure\ExternalApi\CompositePriceProvider

    App\Manga\Infrastructure\ExternalApi\CompositePriceProvider:
        arguments:
            $providers: !tagged_iterator { tag: app.volume_price_provider }

    # eBay Browse API — primary live price source, OAuth app-token. Priority 100.
    # No-op when EBAY_CLIENT_ID is empty (same pattern as HardcoverCoversApiClient).
    App\Manga\Infrastructure\ExternalApi\Ebay\EbayOAuthTokenProvider:
        arguments:
            $oauthUrl: '%env(EBAY_OAUTH_URL)%'
            $clientId: '%env(EBAY_CLIENT_ID)%'
            $clientSecret: '%env(EBAY_CLIENT_SECRET)%'
            $cache: '@cache.app'

    App\Manga\Infrastructure\ExternalApi\EbayBrowsePriceProvider:
        arguments:
            $baseUrl: '%env(EBAY_BASE_URL)%'
            $campaignId: '%env(default::EBAY_CAMPAIGN_ID)%'
        tags:
            - { name: app.volume_price_provider, priority: 100 }

    # Chasse aux livres — FR price comparator (Amazon, Fnac, Rakuten, momox…), keyless,
    # queried by ISBN. Priority 90. Disable by setting CHASSE_AUX_LIVRES_BASE_URL="".
    App\Manga\Infrastructure\ExternalApi\ChasseAuxLivresPriceProvider:
        arguments:
            $baseUrl: '%env(CHASSE_AUX_LIVRES_BASE_URL)%'
        tags:
            - { name: app.volume_price_provider, priority: 90 }

    # Google Books saleInfo — reference price (e-book, indicative). Priority 60.
    # &country= is mandatory (otherwise 403 from cloud). No-op when API key is empty.
    App\Manga\Infrastructure\ExternalApi\GoogleBooksPriceProvider:
        arguments:
            $apiKey: '%env(GOOGLE_BOOKS_API_KEY)%'
        tags:
            - { name: app.volume_price_provider, priority: 60 }

    # Price offer cache — PSR cache pool, 24h TTL.
    App\Manga\Domain\PriceOfferCacheInterface:
        alias: App\Manga\Infrastructure\Cache\PsrPriceOfferCache

    App\Manga\Infrastructure\Cache\PsrPriceOfferCache:
        arguments:
            $pool: '@cache.app'
            $ttlSeconds: 86400

    # Edition discovery cache — repeated searches skip the whole catalogue fan-out.
    App\Manga\Domain\EditionDiscoveryCacheInterface:
        alias: App\Manga\Infrastructure\Cache\PsrEditionDiscoveryCache

    App\Manga\Infrastructure\Cache\PsrEditionDiscoveryCache:
        arguments:
            $pool: '@cache.app'

    # Generic cache-backed rate limiter (no symfony/rate-limiter dependency).
    App\Shared\Infrastructure\RateLimit\CacheRateLimiter:
        arguments:
            $pool: '@cache.app'

    # Keyless summary translation (Google "gtx" web endpoint) — English → French.
    App\Manga\Domain\SummaryTranslatorInterface:
        alias: App\Manga\Infrastructure\Translation\GoogleTranslateSummaryTranslator

    App\Manga\Infrastructure\Translation\GoogleTranslateSummaryTranslator:
        arguments:
            $baseUrl: '%env(GOOGLE_TRANSLATE_BASE_URL)%'

    App\Collection\Domain\CollectionRepositoryInterface:
        alias: App\Collection\Infrastructure\Doctrine\DoctrineCollectionRepository

    App\Notification\Domain\NotificationRepositoryInterface:
        alias: App\Notification\Infrastructure\Doctrine\DoctrineNotificationRepository

    App\Notification\Domain\ArticleRepositoryInterface:
        alias: App\Notification\Infrastructure\Doctrine\DoctrineArticleRepository

    App\Notification\Domain\CrawlRunRepositoryInterface:
        alias: App\Notification\Infrastructure\Doctrine\DoctrineCrawlRunRepository

    App\Notification\Domain\CrawlJobRepositoryInterface:
        alias: App\Notification\Infrastructure\Doctrine\DoctrineCrawlJobRepository

    App\Notification\Domain\ActivityLogRepositoryInterface:
        alias: App\Notification\Infrastructure\Doctrine\DoctrineActivityLogRepository

    App\Notification\Infrastructure\Doctrine\DoctrineActivityLogRepository:
        arguments:
            $doctrine: '@doctrine'

    App\Notification\Application\Schedule\DispatchFollowingCrawlTask:
        arguments:
            $rssFeeds: '%following.rss_feeds%'

    App\Notification\Domain\Service\RssFeedParserInterface:
        alias: App\Notification\Infrastructure\Rss\RssFeedParser

    App\Notification\Domain\Service\JikanNewsClientInterface:
        alias: App\Notification\Infrastructure\Jikan\JikanNewsClient

    App\Notification\Application\Email\SendFollowingNotificationHandler:
        arguments:
            $notificationEmail: '%notification_email%'

    App\Notification\Application\Test\SendTestNotificationHandler:
        arguments:
            $notificationEmail: '%notification_email%'

    App\Notification\Domain\TestNotificationRecipientResolverInterface:
        alias: App\Auth\Infrastructure\Notification\DoctrineTestNotificationRecipientResolver

    App\Notification\Domain\DiscordNotifierInterface:
        alias: App\Notification\Infrastructure\Discord\DiscordNotifier

    App\Notification\Infrastructure\Discord\DiscordNotifier:
        arguments:
            $webhookUrl: '%env(default::DISCORD_WEBHOOK_URL)%'

    App\Stats\Domain\StatsRepositoryInterface:
        alias: App\Stats\Infrastructure\Doctrine\DoctrineStatsRepository

    App\Share\Domain\ShareSnapshotRepositoryInterface:
        alias: App\Share\Infrastructure\Doctrine\DoctrineShareSnapshotRepository

    # Share controller builds the public link from the front-end base URL
    App\Share\Infrastructure\Http\ShareController:
        arguments:
            $frontUrl: '%app_front_url%'

    App\Manga\Domain\CoverBatchProgressPublisherInterface:
        alias: App\Manga\Infrastructure\Mercure\MercureCoverBatchProgressPublisher

    App\Manga\Infrastructure\Mercure\MercureCoverBatchProgressPublisher:
        arguments:
            $hubUrl: '%env(MERCURE_URL)%'
            $publisherJwtKey: '%env(MERCURE_PUBLISHER_JWT_KEY)%'
            $logger: '@logger'

    App\Manga\Domain\CoverBatchSubscriberAuthorizerInterface:
        alias: App\Manga\Infrastructure\Mercure\MercureCoverBatchSubscriberAuthorizer

    App\Manga\Infrastructure\Mercure\MercureCoverBatchSubscriberAuthorizer:
        arguments:
            $subscriberJwtKey: '%env(MERCURE_SUBSCRIBER_JWT_KEY)%'
            $publicHubUrlValue: '%env(MERCURE_PUBLIC_URL)%'

    App\Manga\Domain\ScanTokenIssuerInterface:
        alias: App\Manga\Infrastructure\Scan\JwtScanTokenIssuer

    App\Manga\Infrastructure\Scan\JwtScanTokenIssuer:
        arguments:
            $secret: '%env(SCAN_TOKEN_SECRET)%'

    App\Manga\Domain\ScanResultPublisherInterface:
        alias: App\Manga\Infrastructure\Mercure\MercureScanResultPublisher

    App\Manga\Infrastructure\Mercure\MercureScanResultPublisher:
        arguments:
            $hubUrl: '%env(MERCURE_URL)%'
            $publisherJwtKey: '%env(MERCURE_PUBLISHER_JWT_KEY)%'
            $logger: '@logger'

when@test:
    services:
        App\Manga\Domain\ExternalApiClientInterface:
            alias: App\Manga\Infrastructure\ExternalApi\NullMangaApiClient
        App\Manga\Domain\EditionProviderInterface:
            alias: App\Manga\Infrastructure\ExternalApi\NullEditionProvider
        App\Manga\Domain\WorkTitleResolverInterface:
            alias: App\Manga\Infrastructure\ExternalApi\NullWorkTitleResolver
        App\Manga\Domain\VolumePriceProviderInterface:
            alias: App\Manga\Infrastructure\ExternalApi\NullPriceProvider
        App\Manga\Domain\SummaryTranslatorInterface:
            alias: App\Manga\Infrastructure\Translation\NullSummaryTranslator
        App\Manga\Application\SearchExternal\SearchExternalMangaHandler:
            autowire: true
            autoconfigure: true
            arguments:
                $providerLocator: !service_locator
                    jikan: '@App\Manga\Infrastructure\ExternalApi\NullMangaApiClient'
                    googlebooks: '@App\Manga\Infrastructure\ExternalApi\NullMangaApiClient'
        App\Manga\Domain\MangaCoverProviderInterface:
            alias: App\Tests\Doubles\Manga\StubMangaCoverProvider
        App\Manga\Domain\MultiSourceCoverProviderInterface:
            alias: App\Tests\Doubles\Manga\StubMangaCoverProvider
        App\Tests\Doubles\Manga\StubMangaCoverProvider:
            public: true
        App\Manga\Application\SearchVolumeExternal\SearchVolumeExternalHandler:
            autowire: true
            autoconfigure: true
            arguments:
                $providerLocator: !service_locator
                    mangadex: '@App\Manga\Infrastructure\ExternalApi\NullMangaCoverApiClient'
                    googlebooks: '@App\Manga\Infrastructure\ExternalApi\NullMangaCoverApiClient'
        App\Manga\Domain\CoverBatchProgressPublisherInterface:
            alias: App\Tests\Doubles\Manga\InMemoryCoverBatchProgressPublisher
        App\Tests\Doubles\Manga\InMemoryCoverBatchProgressPublisher:
            public: true
        App\Manga\Domain\CoverBatchSubscriberAuthorizerInterface:
            alias: App\Tests\Doubles\Manga\StubCoverBatchSubscriberAuthorizer
        App\Tests\Doubles\Manga\StubCoverBatchSubscriberAuthorizer:
            public: true
        App\Manga\Domain\ScanResultPublisherInterface:
            alias: App\Tests\Doubles\Manga\InMemoryScanResultPublisher
        App\Tests\Doubles\Manga\InMemoryScanResultPublisher:
            public: true
