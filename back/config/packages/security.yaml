security:
    password_hashers:
        App\Auth\Infrastructure\Http\MonitorUser:
            algorithm: plaintext

    providers:
        gate_provider:
            id: App\Auth\Infrastructure\Http\GateUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        messenger_monitor:
            pattern: ^/messenger
            http_basic:
                realm: 'Messenger Monitor'
                provider: gate_provider

        api:
            pattern: ^/api
            stateless: true
            provider: gate_provider
            jwt: ~

    access_control:
        - { path: ^/api/auth/gate, roles: PUBLIC_ACCESS }
        - { path: ^/messenger, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
