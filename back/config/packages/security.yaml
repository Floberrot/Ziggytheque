security:
    password_hashers:
        App\Auth\Domain\User:
            algorithm: bcrypt
        App\Auth\Infrastructure\Http\MonitorUser:
            algorithm: plaintext

    providers:
        app_user_provider:
            id: App\Auth\Infrastructure\Security\DoctrineUserProvider
        monitor_provider:
            id: App\Auth\Infrastructure\Http\MonitorUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        health:
            pattern: ^/health$
            security: false

        messenger_monitor:
            pattern: ^/messenger
            http_basic:
                realm: 'Messenger Monitor'
                provider: monitor_provider

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/api/auth/(register|verify-email|login|request-reset|reset-password)$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/gate$, roles: ROLE_ADMIN }
        - { path: ^/api/admin, roles: ROLE_ADMIN_UNLOCKED }
        - { path: ^/messenger, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Auth\Domain\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
            App\Auth\Infrastructure\Http\MonitorUser:
                algorithm: plaintext
