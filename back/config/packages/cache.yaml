framework:
    cache:
        # Use PostgreSQL (shared across all Railway services) so that the worker
        # container and the back container share the same cache.
        # Required for Zenstruck Messenger Monitor to show workers from the worker
        # service in the /messenger dashboard served by the back service.
        app: cache.adapter.doctrine_dbal
        default_doctrine_dbal_provider: doctrine.dbal.default_connection
