framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    use_notify: true
                    check_delayed_interval: 1000
                retry_strategy:
                    max_retries: 3
                    delay: 15000
                    multiplier: 1
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        default_bus: command.bus
        buses:
            command.bus:
                middleware:
                    - doctrine_transaction
            query.bus: ~
            event.bus:
                default_middleware: allow_no_handlers

        routing:
            App\Manga\Application\Import\ImportMangaCommand: sync
            App\Manga\Application\AddVolume\AddVolumeCommand: sync
            App\Collection\Application\Add\AddToCollectionCommand: sync
            App\Collection\Application\Remove\RemoveFromCollectionCommand: sync
            App\Collection\Application\ToggleVolume\ToggleVolumeCommand: sync
            App\Collection\Application\UpdateStatus\UpdateReadingStatusCommand: sync
            App\Notification\Application\Fetch\FetchRssFeedMessage: async
            App\Notification\Application\Fetch\FetchJikanNewsMessage: async
            App\Notification\Application\Discord\SendSchedulerDiscordSummaryMessage: async
            App\Notification\Application\Test\SendTestNotificationMessage: async
            # Transactional emails are sent by the worker so a slow/unreachable
            # SMTP server never blocks the HTTP request that triggered them.
            Symfony\Component\Mailer\Messenger\SendEmailMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
            routing:
                # Handle inline in tests so MailerAssertionsTrait collects the
                # actual send (the in-memory async transport is never consumed).
                Symfony\Component\Mailer\Messenger\SendEmailMessage: sync
